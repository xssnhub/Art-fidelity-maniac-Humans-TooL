name: Bootstrap human tools

on:
  push:
    branches: [main]
    paths:
      - '.bootstrap/**'
      - '.github/workflows/bootstrap-tools.yml'

permissions:
  contents: write

jobs:
  unpack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Restore source tree
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -d .bootstrap ]; then
            echo "Bootstrap archive already removed."
            exit 0
          fi

          cat .bootstrap/part-* > /tmp/tools.tar.gz.b64
          base64 --decode /tmp/tools.tar.gz.b64 > /tmp/tools.tar.gz
          tar -tzf /tmp/tools.tar.gz
          tar -xzf /tmp/tools.tar.gz
          rm -rf .bootstrap

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Add QuickSharp Baby v1.6 and tool placeholders"
          git push
